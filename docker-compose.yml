
networks:
  chat-network:
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.0.0/16

# ── Named volumes ─────────────────────────────────────────
volumes:
  postgres_data:
  mongo_data:
  redis_data:
  minio_data:
  meilisearch_data:
  libretranslate_data:

services:

  # ── PostgreSQL ──────────────────────────────────────────
  postgres:
    image: postgres:15.7-alpine
    container_name: chatflow-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-chatflow}
      POSTGRES_USER: ${POSTGRES_USER:-chatflow_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-password}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - chat-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-chatflow_user} -d ${POSTGRES_DB:-chatflow}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    ports:
      - "5432:5432"

  # ── MongoDB ─────────────────────────────────────────────
  mongo:
    image: mongo:6.0.15
    container_name: chatflow-mongo
    restart: unless-stopped
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_INITDB_ROOT_USERNAME:-chatflow_user}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_INITDB_ROOT_PASSWORD:-password}
      MONGO_INITDB_DATABASE: ${MONGO_INITDB_DATABASE:-chatflow}
    volumes:
      - mongo_data:/data/db
    networks:
      - chat-network
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    ports:
      - "27017:27017"

  # ── Redis ───────────────────────────────────────────────
  redis:
    image: redis:7.2.5-alpine
    container_name: chatflow-redis
    restart: unless-stopped
    command: >
      redis-server
      --requirepass ${REDIS_PASSWORD:-password}
      --maxmemory 256mb
      --maxmemory-policy allkeys-lru
      --save 60 1
    volumes:
      - redis_data:/data
    networks:
      - chat-network
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-password}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    ports:
      - "6379:6379"

  # ── Auth Service ─────────────────────────────────────────
  auth-service:
    build:
      context: ./auth-service
      dockerfile: Dockerfile
    container_name: chatflow-auth
    restart: unless-stopped
    env_file: .env
    environment:
      DB_HOST: postgres
      REDIS_HOST: redis
      AUTH_SERVICE_PORT: 3001
      NODE_ENV: production
    networks:
      - chat-network
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3001/health"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 30s

  # ── Chat Service ─────────────────────────────────────────
  chat-service:
    build:
      context: ./chat-service
      dockerfile: Dockerfile
    container_name: chatflow-chat
    restart: unless-stopped
    env_file: .env
    environment:
      REDIS_HOST: redis
      MONGO_URI: mongodb://${MONGO_INITDB_ROOT_USERNAME:-chatflow_user}:${MONGO_INITDB_ROOT_PASSWORD:-password}@mongo:27017/${MONGO_INITDB_DATABASE:-chatflow}?authSource=admin
      CHAT_SERVICE_PORT: 3002
      NODE_ENV: production
      LIBRETRANSLATE_URL: http://libretranslate:5000
      MEILISEARCH_URL: http://meilisearch:7700
    networks:
      - chat-network
    depends_on:
      mongo:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3002/health"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 30s

  # ── User Service ─────────────────────────────────────────
  user-service:
    build:
      context: ./user-service
      dockerfile: Dockerfile
    container_name: chatflow-user
    restart: unless-stopped
    env_file: .env
    environment:
      DB_HOST: postgres
      REDIS_HOST: redis
      USER_SERVICE_PORT: 3003
      NODE_ENV: production
      MINIO_ENDPOINT: minio
      MINIO_PORT: "9000"
      MINIO_USE_SSL: "false"
    networks:
      - chat-network
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3003/health"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 30s

  # ── Notification Service ─────────────────────────────────
  notification-service:
    build:
      context: ./notification-service
      dockerfile: Dockerfile
    container_name: chatflow-notification
    restart: unless-stopped
    env_file: .env
    environment:
      REDIS_HOST: redis
      NOTIFICATION_SERVICE_PORT: 3004
      NODE_ENV: production
    networks:
      - chat-network
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3004/health"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 30s

  # ── Frontend ─────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: chatflow-frontend
    restart: unless-stopped
    networks:
      - chat-network
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/health"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 30s

  # ── Nginx API Gateway ─────────────────────────────────────
  nginx:
    build:
      context: ./nginx
      dockerfile: Dockerfile
    container_name: chatflow-nginx
    restart: unless-stopped
    ports:
      - "80:80"
    networks:
      - chat-network
    depends_on:
      auth-service:
        condition: service_healthy
      chat-service:
        condition: service_healthy
      user-service:
        condition: service_healthy
      notification-service:
        condition: service_healthy
      frontend:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost/health"]
      interval: 15s
      timeout: 5s
      retries: 3

  # ── Call Service (mediasoup WebRTC SFU) ───────────────────
  call-service:
    build:
      context: ./call-service
      dockerfile: Dockerfile
    container_name: chatflow-call
    restart: unless-stopped
    env_file: .env
    environment:
      REDIS_HOST: redis
      CALL_SERVICE_PORT: 3005
      ANNOUNCED_IP: ${ANNOUNCED_IP:-127.0.0.1}
      NODE_ENV: production
    ports:
      - "3005:3005"
      # NOTE: Uncomment UDP range on Linux servers. Avoid on Docker Desktop (10000 ports).
      # - "40000-49999:40000-49999/udp"
    networks:
      - chat-network
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3005/health"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 30s

  # ── MinIO (Self-hosted file storage) ─────────────────────
  minio:
    image: minio/minio:latest
    container_name: chatflow-minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-chatflow_admin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-chatflow_password}
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    networks:
      - chat-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 20s
      retries: 3
      start_period: 20s

  # ── MinIO bucket init (one-shot job) ─────────────────────
  minio-init:
    image: minio/mc:latest
    container_name: chatflow-minio-init
    restart: "no"
    depends_on:
      minio:
        condition: service_healthy
    networks:
      - chat-network
    entrypoint: >
      /bin/sh -c "
        mc alias set myminio http://minio:9000 $${MINIO_ROOT_USER:-chatflow_admin} $${MINIO_ROOT_PASSWORD:-chatflow_password} &&
        mc mb --ignore-existing myminio/avatars &&
        mc mb --ignore-existing myminio/attachments &&
        mc mb --ignore-existing myminio/voice-notes &&
        mc mb --ignore-existing myminio/thumbnails &&
        mc anonymous set download myminio/avatars &&
        mc anonymous set download myminio/attachments &&
        echo 'MinIO buckets initialized'
      "
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-chatflow_admin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-chatflow_password}

  # ── Meilisearch (Full-text search engine) ─────────────────
  meilisearch:
    image: getmeili/meilisearch:v1.7
    container_name: chatflow-meilisearch
    restart: unless-stopped
    environment:
      MEILI_ENV: development
      MEILI_MASTER_KEY: ${MEILISEARCH_MASTER_KEY:-chatflow-meili-key}
    ports:
      - "7700:7700"
    volumes:
      - meilisearch_data:/meili_data
    networks:
      - chat-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:7700/health"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 10s

  # ── LibreTranslate (Self-hosted translation) ──────────────
  libretranslate:
    image: libretranslate/libretranslate:latest
    container_name: chatflow-libretranslate
    restart: unless-stopped
    environment:
      LT_LOAD_ONLY: "en,es,fr,de,zh,ar,hi,pt,ja,ko,ru"
      LT_DISABLE_WEB_UI: "true"
    ports:
      - "5000:5000"
    volumes:
      # Correct path for language model persistence in recent images
      - libretranslate_data:/home/libretranslate/.local
    networks:
      - chat-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/languages"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 120s
