---
- name: Common server baseline setup
  hosts: all
  become: true

  tasks:
    - name: Update apt cache and upgrade packages
      apt:
        update_cache: true
        upgrade: safe
        cache_valid_time: 3600

    - name: Install common packages
      apt:
        name:
          - curl
          - wget
          - git
          - unzip
          - htop
          - net-tools
          - ufw
          - python3-pip
          - ca-certificates
          - gnupg
          - lsb-release
          - software-properties-common
          - apt-transport-https
        state: present

    - name: Allow SSH through UFW
      ufw:
        rule: allow
        port: '22'
        proto: tcp

    - name: Enable UFW
      ufw:
        state: enabled
        policy: deny

    - name: Check if AWS CLI v2 is installed
      command: aws --version
      register: awscli_check
      failed_when: false
      changed_when: false

    - name: Download AWS CLI v2 installer
      get_url:
        url: https://awscli.amazonaws.com/awscli-exe-linux-x86_64.zip
        dest: /tmp/awscliv2.zip
        mode: '0644'
      when: awscli_check.rc != 0

    - name: Unzip AWS CLI installer
      unarchive:
        src: /tmp/awscliv2.zip
        dest: /tmp/
        remote_src: true
      when: awscli_check.rc != 0

    - name: Install AWS CLI v2
      command: /tmp/aws/install
      when: awscli_check.rc != 0

    - name: Cleanup AWS CLI installer
      file:
        path: "{{ item }}"
        state: absent
      loop:
        - /tmp/awscliv2.zip
        - /tmp/aws
      when: awscli_check.rc != 0

    - name: Set timezone to UTC
      timezone:
        name: UTC

    - name: Disable swap immediately
      command: swapoff -a
      changed_when: false

    - name: Remove swap from /etc/fstab
      replace:
        path: /etc/fstab
        regexp: '^([^#].*\s+swap\s+.*)$'
        replace: '# \1'

    - name: Load br_netfilter kernel module
      modprobe:
        name: br_netfilter
        state: present

    - name: Persist br_netfilter module across reboots
      copy:
        content: "br_netfilter\n"
        dest: /etc/modules-load.d/k8s.conf
        mode: '0644'

    - name: Set kernel parameters for Kubernetes
      sysctl:
        name: "{{ item.key }}"
        value: "{{ item.value }}"
        sysctl_file: /etc/sysctl.d/k8s.conf
        reload: true
      loop:
        - { key: net.bridge.bridge-nf-call-iptables,  value: '1' }
        - { key: net.bridge.bridge-nf-call-ip6tables, value: '1' }
        - { key: net.ipv4.ip_forward,                 value: '1' }
