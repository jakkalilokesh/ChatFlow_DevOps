---
- import_playbook: common.yml

- name: Setup k3s Kubernetes node
  hosts: k3s
  become: true

  vars:
    k3s_version: "v1.30.1+k3s1"
    kubeconfig_local_path: "/app/ansible/chatflow-k3s.yaml"

  tasks:
    - name: Install k3s with custom flags (no traefik, writable kubeconfig)
      shell: |
        curl -sfL https://get.k3s.io | \
          INSTALL_K3S_VERSION="{{ k3s_version }}" \
          sh -s - \
          --write-kubeconfig-mode 644 \
          --disable traefik \
          --cluster-cidr 10.42.0.0/16 \
          --service-cidr 10.43.0.0/16
      args:
        creates: /usr/local/bin/k3s

    - name: Wait for k3s kubeconfig to be ready
      wait_for:
        path: /etc/rancher/k3s/k3s.yaml
        timeout: 120

    - name: Wait for k3s to be ready
      command: k3s kubectl get nodes
      register: k3s_nodes
      until: k3s_nodes.rc == 0
      retries: 20
      delay: 10

    - name: Fetch kubeconfig from remote
      fetch:
        src: /etc/rancher/k3s/k3s.yaml
        dest: "{{ kubeconfig_local_path }}"
        flat: true

    - name: Replace 127.0.0.1 with elastic IP in local kubeconfig
      delegate_to: localhost
      become: false
      replace:
        path: "{{ kubeconfig_local_path }}"
        regexp: 'https://127\.0\.0\.1:6443'
        replace: "https://{{ ansible_host }}:6443"



    - name: Allow required ports through UFW
      ufw:
        rule: allow
        port: "{{ item }}"
        proto: tcp
      loop:
        - '80'
        - '443'
        - '6443'

    - name: Allow NodePort range through UFW
      ufw:
        rule: allow
        port: 30000:32767
        proto: tcp

    - name: Install nginx ingress controller
      command: >
        k3s kubectl apply -f
        https://raw.githubusercontent.com/kubernetes/ingress-nginx/controller-v1.10.1/deploy/static/provider/cloud/deploy.yaml
      register: ingress_result
      changed_when: "'created' in ingress_result.stdout or 'configured' in ingress_result.stdout"

    - name: Create production namespace
      command: k3s kubectl create namespace production
      register: ns_prod
      failed_when: ns_prod.rc != 0 and 'AlreadyExists' not in ns_prod.stderr
      changed_when: ns_prod.rc == 0

    - name: Create staging namespace
      command: k3s kubectl create namespace staging
      register: ns_staging
      failed_when: ns_staging.rc != 0 and 'AlreadyExists' not in ns_staging.stderr
      changed_when: ns_staging.rc == 0

    - name: Create monitoring namespace
      command: k3s kubectl create namespace monitoring
      register: ns_monitoring
      failed_when: ns_monitoring.rc != 0 and 'AlreadyExists' not in ns_monitoring.stderr
      changed_when: ns_monitoring.rc == 0

    - name: Print k3s setup summary
      debug:
        msg: |
          ✅ k3s installed successfully!
          Kubeconfig saved to: {{ kubeconfig_local_path }}
          Use: export KUBECONFIG={{ kubeconfig_local_path }}
          App URL will be: http://{{ ansible_host }}
