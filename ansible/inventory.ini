[jenkins]
jenkins-server ansible_host=JENKINS_PUBLIC_IP ansible_user=ubuntu ansible_ssh_private_key_file=~/.ssh/chat-app-key

[k3s]
k3s-server ansible_host=K3S_ELASTIC_IP ansible_user=ubuntu ansible_ssh_private_key_file=~/.ssh/chat-app-key

[all:vars]
ansible_python_interpreter=/usr/bin/python3
aws_region=us-east-1
project_name=chat-app
