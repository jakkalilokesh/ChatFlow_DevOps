---
- name: Install k3s with custom flags (no traefik, writable kubeconfig)
  shell: |
    curl -sfL https://get.k3s.io | \
      INSTALL_K3S_VERSION="{{ k3s_version | default('v1.30.1+k3s1') }}" \
      sh -s - \
      --write-kubeconfig-mode 644 \
      --disable traefik \
      --cluster-cidr 10.42.0.0/16 \
      --service-cidr 10.43.0.0/16
  args:
    creates: /usr/local/bin/k3s

- name: Wait for k3s kubeconfig to be ready
  wait_for:
    path: /etc/rancher/k3s/k3s.yaml
    timeout: 120

- name: Wait for k3s to be ready
  command: k3s kubectl get nodes
  register: k3s_nodes
  until: k3s_nodes.rc == 0
  retries: 20
  delay: 10

- name: Fetch kubeconfig from remote
  fetch:
    src: /etc/rancher/k3s/k3s.yaml
    dest: "{{ kubeconfig_local_path | default('/app/ansible/chatflow-k3s.yaml') }}"
    flat: true

- name: Replace 127.0.0.1 with elastic IP in local kubeconfig
  delegate_to: localhost
  become: false
  replace:
    path: "{{ kubeconfig_local_path | default('/app/ansible/chatflow-k3s.yaml') }}"
    regexp: 'https://127\.0\.0\.1:6443'
    replace: "https://{{ ansible_host }}:6443"

- name: Allow required ports through UFW
  ufw:
    rule: allow
    port: "{{ item }}"
    proto: tcp
  loop:
    - '80'
    - '443'
    - '6443'

- name: Allow NodePort range through UFW
  ufw:
    rule: allow
    port: 30000:32767
    proto: tcp

- name: Install nginx ingress controller
  command: >
    k3s kubectl apply -f
    https://raw.githubusercontent.com/kubernetes/ingress-nginx/controller-v1.10.1/deploy/static/provider/cloud/deploy.yaml
  register: ingress_result
  changed_when: "'created' in ingress_result.stdout or 'configured' in ingress_result.stdout"

- name: Create namespaces
  command: k3s kubectl create namespace {{ item }}
  register: ns_create
  failed_when: ns_create.rc != 0 and 'AlreadyExists' not in ns_create.stderr
  changed_when: ns_create.rc == 0
  loop:
    - production
    - staging
    - monitoring

- name: Print k3s setup summary
  debug:
    msg: |
      ✅ k3s installed successfully!
      Kubeconfig saved to: {{ kubeconfig_local_path | default('/app/ansible/chatflow-k3s.yaml') }}
      Use: export KUBECONFIG={{ kubeconfig_local_path | default('/app/ansible/chatflow-k3s.yaml') }}
      App URL will be: http://{{ ansible_host }}
