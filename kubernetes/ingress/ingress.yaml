apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: chatflow-ingress
  namespace: production
  annotations:
    nginx.ingress.kubernetes.io/proxy-body-size:       "10m"
    nginx.ingress.kubernetes.io/proxy-read-timeout:    "3600"
    nginx.ingress.kubernetes.io/proxy-send-timeout:    "3600"
    nginx.ingress.kubernetes.io/proxy-connect-timeout: "60"
    nginx.ingress.kubernetes.io/use-regex:             "true"
    # CORS — allow Vercel frontend + any custom domain
    nginx.ingress.kubernetes.io/enable-cors:           "true"
    nginx.ingress.kubernetes.io/cors-allow-origin:     "https://chat-flow-dev-ops.vercel.app,https://chatflow.app"
    nginx.ingress.kubernetes.io/cors-allow-methods:    "GET, POST, PUT, PATCH, DELETE, OPTIONS"
    nginx.ingress.kubernetes.io/cors-allow-headers:    "Authorization, Content-Type, X-Requested-With"
    nginx.ingress.kubernetes.io/cors-allow-credentials:"true"
    # WebSocket support for Socket.io
    nginx.ingress.kubernetes.io/proxy-http-version:    "1.1"
    nginx.ingress.kubernetes.io/configuration-snippet: |
      proxy_set_header Upgrade $http_upgrade;
      proxy_set_header Connection "Upgrade";
spec:
  ingressClassName: nginx
  rules:
    - http:
        paths:
          # Auth service
          - path: /auth
            pathType: Prefix
            backend:
              service:
                name: auth-service
                port:
                  number: 3001
          # Chat REST API
          - path: /api/chat
            pathType: Prefix
            backend:
              service:
                name: chat-service
                port:
                  number: 3002
          # Socket.io WebSocket
          - path: /socket.io
            pathType: Prefix
            backend:
              service:
                name: chat-service
                port:
                  number: 3002
          # User service
          - path: /api/users
            pathType: Prefix
            backend:
              service:
                name: user-service
                port:
                  number: 3003
          # Notification service (REST + WebSocket presence)
          - path: /api/notify
            pathType: Prefix
            backend:
              service:
                name: notification-service
                port:
                  number: 3004
          # Call service (WebRTC signalling)
          - path: /api/call
            pathType: Prefix
            backend:
              service:
                name: call-service
                port:
                  number: 3005
          # AI service (streaming SSE + chat)
          - path: /ai
            pathType: Prefix
            backend:
              service:
                name: ai-service
                port:
                  number: 3006
          # Keys endpoint (auth-service E2EE)
          - path: /api/keys
            pathType: Prefix
            backend:
              service:
                name: auth-service
                port:
                  number: 3001

