apiVersion: apps/v1
kind: Deployment
metadata:
  name: ai-service
  namespace: chatflow
  labels:
    app: ai-service
    component: ai
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ai-service
  template:
    metadata:
      labels:
        app: ai-service
        component: ai
    spec:
      containers:
        - name: ai-service
          image: chatflow/ai-service:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 3006
          envFrom:
            - secretRef:
                name: chatflow-secrets
          env:
            - name: AI_SERVICE_PORT
              value: "3006"
            - name: NODE_ENV
              value: production
            - name: OLLAMA_URL
              value: http://ollama:11434
            - name: WHISPER_URL
              value: http://whisper:9000
          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "512Mi"
              cpu: "500m"
          livenessProbe:
            httpGet:
              path: /health
              port: 3006
            initialDelaySeconds: 15
            periodSeconds: 15
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /ready
              port: 3006
            initialDelaySeconds: 20
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: ai-service
  namespace: chatflow
  labels:
    app: ai-service
spec:
  selector:
    app: ai-service
  ports:
    - name: http
      port: 3006
      targetPort: 3006
  type: ClusterIP
