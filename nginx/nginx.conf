worker_processes auto;
worker_rlimit_nofile 65535;

events {
    worker_connections 4096;
    use epoll;
    multi_accept on;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # ── Logging ─────────────────────────────────────────
    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for" '
                    'rt=$request_time uct="$upstream_connect_time" '
                    'uht="$upstream_header_time" urt="$upstream_response_time"';

    access_log  /var/log/nginx/access.log main;
    error_log   /var/log/nginx/error.log warn;

    # ── Performance ──────────────────────────────────────
    sendfile            on;
    tcp_nopush          on;
    tcp_nodelay         on;
    keepalive_timeout   65;
    types_hash_max_size 4096;
    # Increased for file uploads (voice notes, attachments up to 50 MB)
    client_max_body_size 50m;
    server_tokens       off;

    # ── Gzip ─────────────────────────────────────────────
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css text/xml text/javascript
               application/json application/javascript application/xml+rss
               application/atom+xml image/svg+xml;
    gzip_min_length 1024;
    gzip_disable "MSIE [1-6]\.";

    # ── Rate Limiting ─────────────────────────────────────
    limit_req_zone $binary_remote_addr zone=api_limit:10m rate=100r/s;
    limit_req_zone $binary_remote_addr zone=auth_limit:10m rate=10r/m;
    limit_conn_zone $binary_remote_addr zone=conn_limit:10m;

    # ── Upstreams ─────────────────────────────────────────
    upstream auth_service {
        least_conn;
        server auth-service:3001 max_fails=3 fail_timeout=30s;
        keepalive 32;
    }

    upstream chat_service {
        least_conn;
        server chat-service:3002 max_fails=3 fail_timeout=30s;
        keepalive 64;
    }

    upstream user_service {
        least_conn;
        server user-service:3003 max_fails=3 fail_timeout=30s;
        keepalive 32;
    }

    upstream notification_service {
        least_conn;
        server notification-service:3004 max_fails=3 fail_timeout=30s;
        keepalive 32;
    }

    upstream call_service {
        least_conn;
        server call-service:3005 max_fails=3 fail_timeout=30s;
        keepalive 16;
    }

    upstream frontend_service {
        server frontend:3000 max_fails=3 fail_timeout=30s;
        keepalive 32;
    }

    # ── WebSocket upgrade map ─────────────────────────────
    map $http_upgrade $connection_upgrade {
        default upgrade;
        ''      close;
    }

    # ── Main Server ───────────────────────────────────────
    server {
        listen 80;
        server_name _;

        # ── Security Headers ─────────────────────────────
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-XSS-Protection "1; mode=block" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        # Allow microphone and camera for WebRTC calls
        add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval' https://fonts.googleapis.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com https://fonts.gstatic.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data: blob: https:; media-src 'self' blob:; connect-src 'self' wss: ws: http://localhost:9000; worker-src 'self' blob:;" always;
        # microphone and camera allowed for WebRTC
        add_header Permissions-Policy "geolocation=()" always;

        # ── Connection limits ─────────────────────────────
        limit_conn conn_limit 50;

        # ── Auth Service ─────────────────────────────────
        location /auth/ {
            limit_req zone=auth_limit burst=20 nodelay;
            proxy_pass http://auth_service;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_connect_timeout 5s;
            proxy_read_timeout 30s;
            proxy_send_timeout 30s;
        }

        # E2EE public key endpoints (served by auth-service)
        location /api/keys/ {
            limit_req zone=api_limit burst=30 nodelay;
            proxy_pass http://auth_service;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # ── Chat Service REST ─────────────────────────────
        location /api/chat/ {
            limit_req zone=api_limit burst=50 nodelay;
            proxy_pass http://chat_service;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_connect_timeout 5s;
            proxy_read_timeout 60s;
            proxy_send_timeout 60s;
        }

        # DM conversation endpoints
        location /api/dm/ {
            limit_req zone=api_limit burst=50 nodelay;
            proxy_pass http://chat_service;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # Bookmark endpoints
        location /api/bookmarks/ {
            limit_req zone=api_limit burst=30 nodelay;
            proxy_pass http://chat_service;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # Channel endpoints (pins etc.)
        location /api/channels/ {
            limit_req zone=api_limit burst=30 nodelay;
            proxy_pass http://chat_service;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # Admin analytics (served by chat-service)
        location /api/admin/ {
            limit_req zone=api_limit burst=20 nodelay;
            proxy_pass http://chat_service;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # ── Socket.io WebSocket (chat + notification) ─────
        location /socket.io/ {
            proxy_pass http://chat_service;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $connection_upgrade;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_read_timeout 3600s;
            proxy_send_timeout 3600s;
            proxy_connect_timeout 7s;
            proxy_buffering off;
        }

        # ── Call Service (WebRTC signaling over WS) ───────
        location /call/ {
            limit_req zone=api_limit burst=30 nodelay;
            proxy_pass http://call_service;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        location /call-ws/ {
            proxy_pass http://call_service;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $connection_upgrade;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_read_timeout 3600s;
            proxy_send_timeout 3600s;
            proxy_buffering off;
        }

        # ── User Service ──────────────────────────────────
        location /api/users/ {
            limit_req zone=api_limit burst=30 nodelay;
            proxy_pass http://user_service;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_connect_timeout 5s;
            proxy_read_timeout 30s;
            # Allow large bodies for avatar / attachment upload
            client_max_body_size 50m;
        }

        # MinIO presigned upload endpoint (user-service)
        location /api/upload/ {
            limit_req zone=api_limit burst=20 nodelay;
            proxy_pass http://user_service;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            client_max_body_size 50m;
        }

        # ── Notification Service ──────────────────────────
        location /api/notify/ {
            limit_req zone=api_limit burst=50 nodelay;
            proxy_pass http://notification_service;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # Notification socket.io (separate namespace path)
        location /notify-ws/ {
            proxy_pass http://notification_service;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $connection_upgrade;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_read_timeout 3600s;
            proxy_send_timeout 3600s;
            proxy_buffering off;
        }

        # ── Health check ──────────────────────────────────
        location = /health {
            proxy_pass http://auth_service/health;
            access_log off;
            proxy_connect_timeout 3s;
            proxy_read_timeout 5s;
        }

        # ── Frontend (React SPA) ──────────────────────────
        location / {
            limit_req zone=api_limit burst=200 nodelay;
            proxy_pass http://frontend_service;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_connect_timeout 5s;
            proxy_read_timeout 30s;

            # SPA fallback — let React Router handle 404s
            proxy_intercept_errors on;
            error_page 404 = /;
        }

        # ── Static assets caching ─────────────────────────
        location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot|webp|avif)$ {
            proxy_pass http://frontend_service;
            add_header Cache-Control "public, max-age=31536000, immutable";
            proxy_set_header Host $host;
            access_log off;
        }
    }
}
